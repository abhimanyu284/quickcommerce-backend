<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>QuickCommerce</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
    body { background: #f5f5f5; color: #333; }

    /* NAV */
    nav { background: #6200ea; padding: 16px 24px; display: flex; align-items: center; justify-content: space-between; }
    nav h1 { color: white; font-size: 22px; }
    nav span { color: #ddd; font-size: 13px; }

    /* TABS */
    .tabs { display: flex; background: white; border-bottom: 2px solid #eee; }
    .tab { flex: 1; padding: 14px; text-align: center; cursor: pointer; font-weight: 600; color: #888; transition: 0.2s; }
    .tab.active { color: #6200ea; border-bottom: 3px solid #6200ea; }

    /* CONTENT */
    .page { display: none; padding: 20px; }
    .page.active { display: block; }

    /* STATUS */
    .status { font-size: 12px; color: #4caf50; margin-bottom: 12px; }
    .status.error { color: #f44336; }

    /* CARDS */
    .card-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 16px; }
    .card { background: white; border-radius: 12px; padding: 16px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
    .card h3 { font-size: 16px; margin-bottom: 6px; }
    .card .price { color: #6200ea; font-weight: 700; font-size: 18px; margin-bottom: 4px; }
    .card .meta { font-size: 12px; color: #888; margin-bottom: 12px; }
    .card button { width: 100%; padding: 8px; background: #6200ea; color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: 600; }
    .card button:hover { background: #4a00b4; }

    /* CATEGORIES */
    .cat-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px; }
    .cat-card { background: white; border-radius: 12px; padding: 24px; text-align: center; box-shadow: 0 2px 8px rgba(0,0,0,0.08); cursor: pointer; }
    .cat-card .icon { font-size: 40px; margin-bottom: 8px; }
    .cat-card h3 { font-size: 18px; }
    .cat-card p { font-size: 13px; color: #888; }

    /* CART */
    .cart-item { background: white; border-radius: 12px; padding: 16px; margin-bottom: 12px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
    .cart-total { background: #6200ea; color: white; padding: 16px; border-radius: 12px; text-align: center; font-size: 18px; font-weight: 700; margin-top: 16px; cursor: pointer; }
    .empty { text-align: center; color: #aaa; margin-top: 60px; font-size: 16px; }

    /* ORDERS */
    .order-card { background: white; border-radius: 12px; padding: 16px; margin-bottom: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
    .order-card h3 { margin-bottom: 4px; }
    .badge { display: inline-block; padding: 4px 10px; border-radius: 20px; font-size: 12px; font-weight: 600; margin-top: 6px; }
    .badge.delivered { background: #e8f5e9; color: #4caf50; }
    .badge.out { background: #fff3e0; color: #ff9800; }
    .badge.processing { background: #e3f2fd; color: #2196f3; }

    /* TOAST */
    .toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%); background: #333; color: white; padding: 12px 24px; border-radius: 24px; font-size: 14px; opacity: 0; transition: opacity 0.3s; pointer-events: none; }
    .toast.show { opacity: 1; }
  </style>
</head>
<body>

<nav>
  <h1>⚡ QuickCommerce</h1>
  <span>Local Fashion, Fast Delivery</span>
</nav>

<div class="tabs">
  <div class="tab active" onclick="showTab('home')">🏠 Home</div>
  <div class="tab" onclick="showTab('categories')">📦 Categories</div>
  <div class="tab" onclick="showTab('cart')">🛒 Cart</div>
  <div class="tab" onclick="showTab('orders')">📋 Orders</div>
</div>

<!-- HOME -->
<div class="page active" id="home">
  <p class="status" id="home-status">Fetching products from backend...</p>
  <div class="card-grid" id="product-grid"></div>
</div>

<!-- CATEGORIES -->
<div class="page" id="categories">
  <p class="status" id="cat-status">Fetching categories from backend...</p>
  <div class="cat-grid" id="cat-grid"></div>
</div>

<!-- CART -->
<div class="page" id="cart">
  <div id="cart-content"></div>
</div>

<!-- ORDERS -->
<div class="page" id="orders">
  <p class="status" id="order-status">Fetching orders from backend...</p>
  <div id="order-list"></div>
</div>

<div class="toast" id="toast"></div>

<script>
  const API = 'http://localhost:3000';
  let cart = [];

  // ── Tab Switching ──────────────────────────────
  function showTab(name) {
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.getElementById(name).classList.add('active');
    event.target.classList.add('active');
    if (name === 'cart') renderCart();
  }

  // ── Toast ──────────────────────────────────────
  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2500);
  }

  // ── HOME: Load Products ────────────────────────
  fetch(`${API}/products`)
    .then(r => r.json())
    .then(products => {
      document.getElementById('home-status').textContent = `✅ ${products.length} products loaded live from backend`;
      const grid = document.getElementById('product-grid');
      products.forEach(p => {
        grid.innerHTML += `
          <div class="card">
            <h3>${p.name}</h3>
            <div class="price">₹${p.price}</div>
            <div class="meta">🏪 ${p.store} &nbsp;|&nbsp; ⏱ ${p.eta}</div>
            <button onclick="addToCart(${p.id}, '${p.name}', ${p.price})">Add to Cart</button>
          </div>`;
      });
    })
    .catch(() => {
      const s = document.getElementById('home-status');
      s.textContent = '❌ Cannot reach backend';
      s.className = 'status error';
    });

  // ── CATEGORIES: Load ───────────────────────────
  const icons = ['👔', '👗', '🧥', '🏷️'];
  fetch(`${API}/categories`)
    .then(r => r.json())
    .then(cats => {
      document.getElementById('cat-status').textContent = `✅ Categories loaded live from backend`;
      const grid = document.getElementById('cat-grid');
      cats.forEach((c, i) => {
        grid.innerHTML += `
          <div class="cat-card">
            <div class="icon">${icons[i] || '👕'}</div>
            <h3>${c.name}</h3>
            <p>${c.itemCount} items</p>
          </div>`;
      });
    })
    .catch(() => {
      document.getElementById('cat-status').textContent = '❌ Cannot reach backend';
    });

  // ── ORDERS: Load ───────────────────────────────
  fetch(`${API}/orders`)
    .then(r => r.json())
    .then(orders => {
      document.getElementById('order-status').textContent = `✅ Orders loaded live from backend`;
      const list = document.getElementById('order-list');
      orders.forEach(o => {
        const badgeClass = o.status === 'Delivered' ? 'delivered' : o.status === 'Out for Delivery' ? 'out' : 'processing';
        list.innerHTML += `
          <div class="order-card">
            <h3>${o.id} — ${o.item}</h3>
            <span class="badge ${badgeClass}">${o.status}</span>
            <p style="font-size:13px;color:#888;margin-top:6px;">ETA: ${o.eta}</p>
          </div>`;
      });
    });

  // ── CART ───────────────────────────────────────
  function addToCart(id, name, price) {
    cart.push({ id, name, price });
    showToast(`✅ ${name} added to cart!`);
  }

  function renderCart() {
    const el = document.getElementById('cart-content');
    if (cart.length === 0) {
      el.innerHTML = '<p class="empty">🛒 Your cart is empty</p>';
      return;
    }
    const total = cart.reduce((s, i) => s + i.price, 0);
    el.innerHTML = cart.map(i => `
      <div class="cart-item">
        <div><strong>${i.name}</strong></div>
        <div style="color:#6200ea;font-weight:700;">₹${i.price}</div>
      </div>`).join('');
    el.innerHTML += `<div class="cart-total" onclick="placeOrder()">Place Order — ₹${total}</div>`;
  }

  function placeOrder() {
    cart = [];
    renderCart();
    showToast('🎉 Order placed successfully!');
  }
</script>
</body>
</html>
