apiVersion: apps/v1
kind: Deployment
metadata:
  name: quickcommerce-api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: quickcommerce-api
  template:
    metadata:
      labels:
        app: quickcommerce-api
    spec:
      containers:
      - name: api
        image: quickcommerce-api:latest
        imagePullPolicy: Never
        ports:
        - containerPort: 3000
---
apiVersion: v1
kind: Service
metadata:
  name: quickcommerce-service
spec:
  type: NodePort
  selector:
    app: quickcommerce-api
  ports:
  - port: 3000
    targetPort: 3000
    nodePort: 30001